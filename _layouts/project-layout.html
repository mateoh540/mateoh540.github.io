<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  <!-- Import Open Sans from Google Fonts to match Cayman -->
  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'Open Sans', "Helvetica Neue", Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: #606c71; /* Standard Cayman text color */
      background-color: #fff;
      margin: 0;
      padding: 40px 20px;
    }
    
    h1, h2, h3 {
      color: #159957; /* Cayman Header Green */
      font-weight: 700;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #1e6bb8; /* Cayman Link Blue */
      text-decoration: none;
      font-weight: 600;
    }
    
    .back-link:hover { text-decoration: underline; }
    
    /* Ensure the container matches the width of the Cayman content area */
    .content-wrapper {
      max-width: 800px; 
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <div class="content-wrapper">
    <a href="../" class="back-link">← Back to Portfolio</a>
    {{ content }}
  </div>
</body>
</html>
