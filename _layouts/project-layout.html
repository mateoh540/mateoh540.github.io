<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }}</title>
  
  <link href='https://fonts.googleapis.com/css?family=Open+Sans:400,700' rel='stylesheet' type='text/css'>
  
  <style>
    body {
      font-family: "Open Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
      line-height: 1.5;
      color: #606c71; /* Cayman body text color */
      background-color: #fff;
      margin: 0;
      /* Reduced side padding from 20px to 10px for maximum horizontal space on smaller screens */
      padding: 40px 10px; 
      font-size: 16px;
    }

    /* Cayman Heading Style */
    h1, h2, h3, h4, h5, h6 {
      margin-top: 2rem;
      margin-bottom: 1rem;
      font-weight: normal;
      color: #159957; /* Cayman's primary green heading color */
    }

    /* Cayman Link Style */
    a {
      color: #1e6bb8; /* Cayman link blue */
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      font-weight: bold;
    }

    strong {
      color: #2e3538;
    }
  </style>
</head>
<body>
  <div style="max-width: 64rem; margin: 0 auto; width: 100%;">
    <a href="mateoh540.github.io" class="back-link">← Back to Portfolio</a>
  </div>
</body>
</html>
